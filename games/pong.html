<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Times Table Pong</title>
<link rel="stylesheet" href="../css/style.css" />
<style>
  * { -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { height: 100%; overflow: hidden; }
  .wrap { height: 100dvh; padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; }
  .hero { display: flex; align-items: center; justify-content: space-between; flex: 0 0 auto; }
  .hero .title { font-family: var(--font-display); font-weight: 900; font-size: 1.05rem; display: flex; align-items: center; gap: 8px; }
  .scoreline { font-family: var(--font-display); font-weight: 800; font-size: 1.1rem; display: flex; gap: 10px; }
  .scoreline .a { color: var(--coral); } .scoreline .b { color: var(--blue); }

  #matchArea { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 6px; }
  .field-wrap { flex: 1; min-height: 0; position: relative; background: linear-gradient(90deg, transparent 49.4%, var(--line) 49.4% 50.6%, transparent 50.6%), #0B0E13; border-radius: 14px; border: 1px solid var(--line); overflow: hidden; }

  .equation-badge { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.55); border: 1px solid var(--line); border-radius: 10px; padding: 5px 16px; font-family: var(--font-display); font-weight: 800; font-size: 1.05rem; color: var(--gold); z-index: 6; white-space: nowrap; }

  .paddle-zone { position: absolute; top: 0; width: 40px; height: 100%; touch-action: none; cursor: grab; z-index: 4; }
  .paddle-zone.a { left: 0; } .paddle-zone.b { right: 0; }
  .paddle-zone:active { cursor: grabbing; }
  .paddle { position: absolute; width: 10px; min-width: 8px; border-radius: 6px; box-shadow: 0 0 10px currentColor; pointer-events: none; z-index: 5; }
  .paddle.a { left: 6px; background: var(--coral); color: var(--coral); }
  .paddle.b { right: 6px; background: var(--blue); color: var(--blue); }

  .ball { position: absolute; left: 0; top: 0; width: 34px; height: 34px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 10px var(--gold); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 900; font-size: 1rem; color: #14181F; z-index: 3; will-change: transform; backface-visibility: hidden; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

  .center-msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; font-family: var(--font-display); font-weight: 800; font-size: 1.4rem; color: var(--gold); text-shadow: 0 2px 8px rgba(0,0,0,0.6); pointer-events: none; z-index: 7; }
  .center-msg .btn-row { pointer-events: auto; }

  .controls { flex: 0 0 auto; display: flex; gap: 6px; height: 76px; }
  .side-panel { flex: 1; min-width: 0; background: var(--asphalt-2); border: 1px solid var(--line); border-radius: 14px; padding: 6px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: opacity 0.15s ease; }
  .side-panel.dim { opacity: 0.5; }
  .side-panel .name-tag { font-family: var(--font-display); font-weight: 700; font-size: 0.78rem; }
  .side-panel.a .name-tag { color: var(--coral); } .side-panel.b .name-tag { color: var(--blue); }
  .waiting-txt, .hint-txt { font-size: 0.72rem; color: var(--ink-soft); text-align: center; }
  .hint-txt { color: var(--gold); font-weight: 700; }

  .rotate-overlay { display: none; }
  @media (orientation: portrait) and (max-width: 900px) {
    .wrap { display: none; }
    .rotate-overlay { display: flex; height: 100dvh; align-items: center; justify-content: center; flex-direction: column; gap: 14px; text-align: center; padding: 30px; }
    .rotate-overlay .icon { font-size: 3rem; }
  }
</style>
</head>
<body>
<a href="../menu.html" id="ttrMenuBtn" title="Back to menu" style="position:fixed; top:10px; left:10px; z-index:99999; display:flex; align-items:center; gap:6px; background:rgba(15,19,25,0.82); color:#fff; text-decoration:none; font-family:sans-serif; font-size:12px; font-weight:700; padding:7px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.25); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); box-shadow:0 2px 8px rgba(0,0,0,0.35);">🏠 Menu</a>
<div class="rotate-overlay"><div class="icon">🔄</div><h2>Turn your device sideways</h2><p>Table Pong is played in landscape, with a player at each end.</p></div>

<div class="wrap">
  <div class="hero">
    <div class="title"><span>🏓</span> TABLE PONG</div>
    <div class="scoreline"><span class="a" id="scoreA">0</span> : <span class="b" id="scoreB">0</span></div>
  </div>
  <div class="stripe"></div>

  <div class="panel" id="setupPanel" style="display:flex; flex-direction:column; gap:12px;">
    <h1>Set up your match</h1>
    <p id="p1Line">Loading your profile…</p>
    <div id="p2Container"></div>
    <button class="btn gold" id="startBtn" style="display:none;">Start match 🏓</button>
  </div>

  <div id="matchArea" style="display:none;">
    <div class="field-wrap" id="fieldWrap">
      <div class="equation-badge" id="equationBadge"></div>
      <div class="paddle-zone a" id="paddleZoneA"><div class="paddle a" id="paddleA"></div></div>
      <div class="paddle-zone b" id="paddleZoneB"><div class="paddle b" id="paddleB"></div></div>
      <div id="ballsLayer"></div>
      <div class="center-msg" id="centerMsg"></div>
    </div>
    <div class="controls">
      <div class="side-panel a" id="panelA"></div>
      <div class="side-panel b" id="panelB"></div>
    </div>
  </div>
</div>

<script type="module">
import { levelInfo, generateQuestion } from "../js/levels.js";
import { renderPlayer2Login } from "../js/player2-login.js";
import { scheduleAIChoice } from "../js/ai-opponent.js";

const classId = sessionStorage.getItem("ttr_classId");
if (!classId) window.location.href = "../index.html";

const players = {
  a: { uid: sessionStorage.getItem("ttr_uid"), name: sessionStorage.getItem("ttr_name"), level: parseInt(sessionStorage.getItem("ttr_level") || "1", 10) },
  b: null
};

document.getElementById("p1Line").textContent = `${players.a.name} (${levelInfo(players.a.level).label}) is the left player.`;
renderPlayer2Login(document.getElementById("p2Container"), classId, players.a.uid).then(profile => {
  players.b = { uid: profile.uid, name: profile.name, level: profile.level || 1, isAI: !!profile.isAI, aiProfile: profile.profile || null };
  document.getElementById("p2Container").innerHTML = `<p class="hint-text">Right player: ${profile.name} (${levelInfo(players.b.level).label}) ✔️</p>`;
  document.getElementById("startBtn").style.display = "inline-block";
});

// Per-difficulty paddle-tracking skill for the AI's paddle drag control
// (separate from its answer accuracy/reaction speed) — how fast it can slide
// the paddle and how precisely it aims once it has picked a ball to chase.
const AI_PADDLE_SKILL = {
  easy:   { maxSpeed: 55,  wobble: 14 },
  medium: { maxSpeed: 80,  wobble: 7 },
  hard:   { maxSpeed: 105, wobble: 2 },
};
let aiChoiceCancel = null;
let aiAim = { a: 0, b: 0 }, aiAimTimer = { a: 0, b: 0 };
// The value (not index) of the ball the AI has committed to chasing this
// wave — null while it's still "thinking". Set asynchronously by
// scheduleAIChoice below, same accuracy/delay model as every other game.
let aiTargetValue = { a: null, b: null };

const setupPanel = document.getElementById("setupPanel");
const matchArea = document.getElementById("matchArea");
const fieldWrap = document.getElementById("fieldWrap");
const paddleZoneEls = { a: document.getElementById("paddleZoneA"), b: document.getElementById("paddleZoneB") };
const paddleEls = { a: document.getElementById("paddleA"), b: document.getElementById("paddleB") };
const ballsLayer = document.getElementById("ballsLayer");
const equationEl = document.getElementById("equationBadge");
const centerMsg = document.getElementById("centerMsg");
const panelEls = { a: document.getElementById("panelA"), b: document.getElementById("panelB") };
const scoreEls = { a: document.getElementById("scoreA"), b: document.getElementById("scoreB") };

const PADDLE_HEIGHT_PCT = 24;
const BASE_SPEED = 10, MAX_SPEED = 65, SPEED_STEP = 2.5, WIN_SCORE = 10;
const EDGE_A = 3.5, EDGE_B = 96.5;
const LANES = [28, 50, 72];

let score = { a: 0, b: 0 };
let paddleY = { a: 50, b: 50 };
let balls = []; // { value, correct, x, y, prevX, vx, vy, el }
let turn = "a"; // which side is currently defending (must hit the correct ball)
let currentWaveToken = null;
let running = false, lastTs = null, rafId = null;

document.getElementById("startBtn").addEventListener("click", () => {
  score = { a: 0, b: 0 };
  updateScoreDisplay();
  setupPanel.style.display = "none";
  matchArea.style.display = "flex";
  paddleY = { a: 50, b: 50 };
  const first = Math.random() < 0.5 ? "a" : "b";
  spawnWave(first, 50, 50, first === "a" ? -BASE_SPEED : BASE_SPEED);
  running = true; lastTs = null;
  rafId = requestAnimationFrame(loop);
});

function updateScoreDisplay() { scoreEls.a.textContent = score.a; scoreEls.b.textContent = score.b; }

function buildOptions(correct) {
  const used = new Set([correct]); const opts = [correct];
  const offsets = [-2, -1, 1, 2].sort(() => Math.random() - 0.5);
  for (const off of offsets) {
    if (opts.length >= 3) break;
    const val = correct + off;
    if (val > 0 && !used.has(val)) { used.add(val); opts.push(val); }
  }
  while (opts.length < 3) {
    const val = correct + Math.floor(Math.random() * 5) - 2;
    if (val > 0 && !used.has(val)) { used.add(val); opts.push(val); }
  }
  return opts.sort(() => Math.random() - 0.5);
}

// Launches a fresh trio of balls (one correct, two within ±2) from
// (originX, originY) toward `defenderKey`, who must drag their paddle onto
// the correct one — the other two simply pass through with no collision.
function spawnWave(defenderKey, originX, originY, vx) {
  if (aiChoiceCancel) { aiChoiceCancel(); aiChoiceCancel = null; }

  turn = defenderKey;
  const waveToken = {};
  currentWaveToken = waveToken;

  const q = generateQuestion(players[defenderKey].level);
  const options = buildOptions(q.answer);
  equationEl.textContent = `${q.text} = ?`;

  const lanes = [...LANES].sort(() => Math.random() - 0.5);
  balls = options.map((val, i) => ({
    value: val,
    correct: val === q.answer,
    x: originX,
    y: originY,
    prevX: originX,
    vx,
    vy: (lanes[i] - originY) * 0.22,
    el: null,
  }));
  createBallEls();
  renderPanelsForWave(defenderKey);

  aiTargetValue[defenderKey] = null;
  if (players[defenderKey].isAI) {
    aiChoiceCancel = scheduleAIChoice(players[defenderKey].aiProfile, q.answer, options, (isCorrect, value) => {
      aiChoiceCancel = null;
      if (currentWaveToken !== waveToken) return;
      aiTargetValue[defenderKey] = value;
      const statusEl = document.getElementById("aiStatusTxt");
      if (statusEl) statusEl.textContent = "🤖 tracking…";
    });
  }
}

function createBallEls() {
  ballsLayer.innerHTML = "";
  balls.forEach(b => {
    const el = document.createElement("div");
    el.className = "ball";
    el.textContent = b.value;
    b.el = el;
    ballsLayer.appendChild(el);
  });
  renderBallPositions();
}

function renderBallPositions() {
  const rect = fieldWrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  balls.forEach(b => {
    // Snap to whole device pixels (not just whole CSS pixels) — animating at
    // fractional pixel offsets forces the browser to anti-alias the ball's
    // text every frame, which is what reads as "blurry" on a moving ball.
    const px = Math.round((b.x / 100) * rect.width * dpr) / dpr;
    const py = Math.round((b.y / 100) * rect.height * dpr) / dpr;
    b.el.style.transform = `translate3d(${px}px, ${py}px, 0) translate(-50%, -50%)`;
  });
}

function renderPanelsForWave(defenderKey) {
  const attackerKey = defenderKey === "a" ? "b" : "a";

  const dPanel = panelEls[defenderKey];
  dPanel.classList.remove("dim");
  if (players[defenderKey].isAI) {
    dPanel.innerHTML = `<div class="name-tag">${players[defenderKey].name}</div><p class="waiting-txt" id="aiStatusTxt">🤖 thinking…</p>`;
  } else {
    dPanel.innerHTML = `<div class="name-tag">${players[defenderKey].name}</div><p class="hint-txt">🎯 Drag to the correct ball!</p>`;
  }

  const aPanel = panelEls[attackerKey];
  aPanel.classList.add("dim");
  aPanel.innerHTML = `<div class="name-tag">${players[attackerKey].name}</div><p class="waiting-txt">Watching the rally…</p>`;
}

function renderPaddles() {
  ["a", "b"].forEach(key => {
    const el = paddleEls[key];
    el.style.height = PADDLE_HEIGHT_PCT + "%";
    el.style.top = (paddleY[key] - PADDLE_HEIGHT_PCT / 2) + "%";
  });
}

// ---- click-and-drag paddle control ----
function setFromClientY(key, clientY) {
  const rect = fieldWrap.getBoundingClientRect();
  const half = PADDLE_HEIGHT_PCT / 2;
  let pct = ((clientY - rect.top) / rect.height) * 100;
  pct = Math.max(half, Math.min(100 - half, pct));
  paddleY[key] = pct;
}

["a", "b"].forEach(key => {
  const zone = paddleZoneEls[key];
  let dragging = false, pointerId = null;
  function onDown(e) {
    if (players[key] && players[key].isAI) return;
    dragging = true;
    pointerId = e.pointerId;
    if (zone.setPointerCapture) { try { zone.setPointerCapture(pointerId); } catch (err) {} }
    setFromClientY(key, e.clientY);
    renderPaddles();
    e.preventDefault();
  }
  function onMove(e) {
    if (!dragging || (pointerId !== null && e.pointerId !== pointerId)) return;
    setFromClientY(key, e.clientY);
    renderPaddles();
    e.preventDefault();
  }
  function onUp(e) {
    if (pointerId !== null && e.pointerId !== pointerId) return;
    dragging = false; pointerId = null;
  }
  zone.addEventListener("pointerdown", onDown);
  zone.addEventListener("pointermove", onMove);
  zone.addEventListener("pointerup", onUp);
  zone.addEventListener("pointercancel", onUp);
});

// ---- AI paddle drag control ----
function updateAIPaddles(dt) {
  ["a", "b"].forEach(key => {
    if (!players[key] || !players[key].isAI) return;
    if (turn !== key) return; // only the defending AI needs to react this leg
    if (aiTargetValue[key] == null) return; // still "thinking" — hold position
    const targetBall = balls.find(b => b.value === aiTargetValue[key]);
    if (!targetBall) return;

    const skill = AI_PADDLE_SKILL[players[key].aiProfile.key] || AI_PADDLE_SKILL.medium;
    aiAimTimer[key] -= dt;
    if (aiAimTimer[key] <= 0) {
      aiAim[key] = (Math.random() * 2 - 1) * skill.wobble;
      aiAimTimer[key] = 0.2 + Math.random() * 0.25;
    }
    const half = PADDLE_HEIGHT_PCT / 2;
    const targetY = Math.max(half, Math.min(100 - half, targetBall.y + aiAim[key]));
    const diff = targetY - paddleY[key];
    const vel = Math.max(-skill.maxSpeed, Math.min(skill.maxSpeed, diff * 8));
    paddleY[key] += vel * dt;
    paddleY[key] = Math.max(half, Math.min(100 - half, paddleY[key]));
  });
}

function clearBalls() {
  ballsLayer.innerHTML = "";
  balls = [];
}

function loop(ts) {
  if (!running) return;
  if (lastTs === null) lastTs = ts;
  const dt = Math.min(0.05, (ts - lastTs) / 1000);
  lastTs = ts;

  updateAIPaddles(dt);
  renderPaddles();

  for (const b of balls) {
    b.prevX = b.x;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.y <= 2) { b.y = 2; b.vy = Math.abs(b.vy); }
    if (b.y >= 98) { b.y = 98; b.vy = -Math.abs(b.vy); }
  }

  const correctBall = balls.find(b => b.correct);
  let resolved = false;
  if (correctBall) {
    if (correctBall.vx < 0 && correctBall.prevX > EDGE_A && correctBall.x <= EDGE_A) {
      resolved = true;
      const hit = correctBall.y >= paddleY.a - PADDLE_HEIGHT_PCT / 2 && correctBall.y <= paddleY.a + PADDLE_HEIGHT_PCT / 2;
      if (hit) bounceWave("a", correctBall); else missWave("a");
    } else if (correctBall.vx > 0 && correctBall.prevX < EDGE_B && correctBall.x >= EDGE_B) {
      resolved = true;
      const hit = correctBall.y >= paddleY.b - PADDLE_HEIGHT_PCT / 2 && correctBall.y <= paddleY.b + PADDLE_HEIGHT_PCT / 2;
      if (hit) bounceWave("b", correctBall); else missWave("b");
    }
  }
  if (resolved) return; // bounceWave / missWave schedule their own next frame

  // the two wrong balls have no collisions at all — they just sail off-screen
  balls = balls.filter(b => {
    if (!b.correct && (b.x < -4 || b.x > 104)) { b.el.remove(); return false; }
    return true;
  });

  renderBallPositions();
  rafId = requestAnimationFrame(loop);
}

// Correct ball was caught — it "splits" back into a fresh trio heading the
// other way, with the same 1-correct / 2-close-wrong shape and a new sum.
function bounceWave(key, correctBall) {
  const offset = (correctBall.y - paddleY[key]) / (PADDLE_HEIGHT_PCT / 2);
  const speed = Math.min(MAX_SPEED, Math.hypot(correctBall.vx, correctBall.vy) + SPEED_STEP);
  const dir = key === "a" ? 1 : -1;
  const newVx = dir * speed * 0.9;
  const originX = key === "a" ? 4 : 96;
  const originY = Math.max(4, Math.min(96, correctBall.y + offset * 6));
  const other = key === "a" ? "b" : "a";

  clearBalls();
  spawnWave(other, originX, originY, newVx);
  rafId = requestAnimationFrame(loop);
}

// Correct ball reached `key`'s edge without being caught — the other player
// scores the point.
function missWave(key) {
  const scorer = key === "a" ? "b" : "a";
  clearBalls();
  pointFor(scorer, key);
}

function pointFor(scorerKey, missedKey) {
  score[scorerKey]++;
  updateScoreDisplay();
  if (score[scorerKey] >= WIN_SCORE) { endMatch(scorerKey); return; }
  centerMsg.textContent = `POINT — ${players[scorerKey].name}!`;
  running = false;
  setTimeout(() => {
    centerMsg.textContent = "";
    running = true; lastTs = null;
    spawnWave(missedKey, 50, 50, missedKey === "a" ? -BASE_SPEED : BASE_SPEED);
    rafId = requestAnimationFrame(loop);
  }, 1100);
}

function endMatch(winnerKey) {
  running = false;
  cancelAnimationFrame(rafId);
  if (aiChoiceCancel) { aiChoiceCancel(); aiChoiceCancel = null; }
  clearBalls();
  equationEl.textContent = "";
  ["a", "b"].forEach(k => { panelEls[k].classList.add("dim"); panelEls[k].innerHTML = `<div class="name-tag">${players[k].name}</div>`; });
  centerMsg.innerHTML = `🏆 ${players[winnerKey].name} WINS! 🏆`;
  const btnRow = document.createElement("div");
  btnRow.className = "btn-row";
  btnRow.style.cssText = "display:flex; gap:10px; pointer-events:auto;";
  btnRow.innerHTML = `<button class="btn gold" id="rematchBtn">Rematch</button><button class="btn ghost" id="menuBtn">Back to menu</button>`;
  centerMsg.appendChild(btnRow);
  document.getElementById("rematchBtn").addEventListener("click", () => {
    score = { a: 0, b: 0 }; updateScoreDisplay();
    paddleY = { a: 50, b: 50 };
    running = true; lastTs = null;
    const first = Math.random() < 0.5 ? "a" : "b";
    spawnWave(first, 50, 50, first === "a" ? -BASE_SPEED : BASE_SPEED);
    rafId = requestAnimationFrame(loop);
  });
  document.getElementById("menuBtn").addEventListener("click", () => window.location.href = "../menu.html");
}
</script>
</body>
</html>
